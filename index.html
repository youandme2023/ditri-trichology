
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditri Trichology Studio</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  font-size:20px;
  background:#ffffff;
  color:#000000;
}
header {
  text-align:center;
  padding:30px 10px;
  font-size:28px;
  font-weight:bold;
}
section {
  padding:20px;
}
button {
  font-size:20px;
  padding:12px 20px;
  background:#f0f0f0;
  border:1px solid #ccc;
  cursor:pointer;
}
#splash {
  position:fixed;
  inset:0;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  animation: fadeOut 3.5s forwards;
}
#logo {
  opacity:0;
  animation: fadeInOut 3s forwards;
}
@keyframes fadeInOut {
  0% {opacity:0;}
  30% {opacity:1;}
  70% {opacity:1;}
  100% {opacity:0;}
}
@keyframes fadeOut {
  0% {opacity:1;}
  90% {opacity:1;}
  100% {opacity:0; visibility:hidden;}
}
</style>
</head>
<body>

<div id="splash">
  <img id="logo" src="icons/icon-512.png" width="200">
</div>

<header>DiTri Trichology Studio</header>

<section>
  <p>Главная страница приложения.</p>
  <button onclick="alert('Протокол открыт')">Открыть протокол</button>
</section>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
